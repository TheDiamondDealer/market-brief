name: Validate Market Brief

on:
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'site/**'
      - 'schemas/**'
      - 'tests/**'
      - 'requirements/**'
      - '.github/workflows/**'
      - '.github/dependabot.yml'

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          show-progress: false

      - name: Validate immutable dependency pins
        run: |
          python scripts/check_ci_pins.py > ci-pin-diagnostics.txt 2>&1 || {
            cat ci-pin-diagnostics.txt
            exit 1
          }
          cat ci-pin-diagnostics.txt

      - name: Upload pin diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-pin-diagnostics
          path: ci-pin-diagnostics.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Use Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements/ci.txt
            requirements/political.txt
            requirements/validation.txt

      - name: Install offline test dependencies
        run: |
          python -m pip install --disable-pip-version-check --requirement requirements/ci.txt
          python -m pip check

      - name: Compile Python
        run: python -m py_compile scripts/*.py tests/*.py

      - name: Check JavaScript syntax recursively
        run: find site tests/js -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Validate generated schemas and semantics
        run: |
          python scripts/validate_generated_data.py
          python scripts/validate_crowd_expectations.py
          python scripts/validate_gdelt_radar.py

      - name: Audit static performance, accessibility and payloads
        run: python scripts/audit_static_site.py

      - name: Run offline fixture, workflow and route tests
        run: |
          set -o pipefail
          python -m unittest discover -s tests -v 2>&1 | tee unit-test-log.txt

      - name: Upload unit-test diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-test-diagnostics
          path: unit-test-log.txt
          if-no-files-found: ignore
          retention-days: 7
