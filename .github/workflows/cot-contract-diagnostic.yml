name: BR-06 COT contract diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/cot-contract-diagnostic.yml'

permissions:
  contents: read

jobs:
  inspect-official-identities:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Query CFTC dataset metadata and current identities
        shell: python
        run: |
          import json
          import urllib.parse
          import urllib.request
          from collections import defaultdict

          HEADERS = {'User-Agent': 'MarketBriefBR06Diagnostic/1.0'}

          def get_json(url):
              request = urllib.request.Request(url, headers=HEADERS)
              with urllib.request.urlopen(request, timeout=90) as response:
                  return json.load(response)

          catalog_url = 'https://api.us.socrata.com/api/catalog/v1?' + urllib.parse.urlencode({
              'search_context': 'publicreporting.cftc.gov',
              'q': 'Commitments of Traders futures only',
              'limit': '100',
          })
          catalog = get_json(catalog_url)
          print('=== CFTC catalog datasets ===')
          for item in catalog.get('results', []):
              resource = item.get('resource', {})
              name = str(resource.get('name', ''))
              if any(term in name.lower() for term in ('disaggregated', 'traders in financial', 'legacy')):
                  print(json.dumps({
                      'id': resource.get('id'),
                      'name': name,
                      'description': str(resource.get('description', ''))[:180],
                      'updatedAt': resource.get('updatedAt'),
                  }, sort_keys=True))

          datasets = {
              'disaggregated': '72hh-3qpy',
              'tff': 'gpe5-46if',
          }
          queries = [
              ('disaggregated', 'CRUDE OIL'),
              ('disaggregated', 'HENRY HUB'),
              ('disaggregated', 'NATURAL GAS'),
              ('tff', '10-YEAR'),
              ('tff', 'TREASURY NOTES'),
          ]

          for report, search in queries:
              where = (
                  "report_date_as_yyyy_mm_dd >= '2026-01-01T00:00:00.000' "
                  f"AND market_and_exchange_names like '%{search.replace("'", "''")}%'"
              )
              params = urllib.parse.urlencode({
                  '$limit': '5000',
                  '$order': 'report_date_as_yyyy_mm_dd DESC',
                  '$where': where,
              })
              rows = get_json(f"https://publicreporting.cftc.gov/resource/{datasets[report]}.json?{params}")
              identities = defaultdict(lambda: {'latest': '', 'openInterest': 0})
              for row in rows:
                  code = str(row.get('cftc_contract_market_code', '')).strip()
                  name = str(row.get('market_and_exchange_names', '')).strip()
                  date = str(row.get('report_date_as_yyyy_mm_dd', ''))[:10]
                  try:
                      oi = float(row.get('open_interest_all') or 0)
                  except (TypeError, ValueError):
                      oi = 0
                  identity = identities[(code, name)]
                  identity['latest'] = max(identity['latest'], date)
                  identity['openInterest'] = max(identity['openInterest'], oi)

              ranked = sorted(
                  identities.items(),
                  key=lambda item: (item[1]['latest'], item[1]['openInterest'], item[0][0]),
                  reverse=True,
              )[:12]
              print(f"=== {report}: {search} ===")
              for (code, name), meta in ranked:
                  print(json.dumps({
                      'code': code,
                      'name': name,
                      'latest': meta['latest'],
                      'maxOpenInterest': round(meta['openInterest']),
                  }, sort_keys=True))
