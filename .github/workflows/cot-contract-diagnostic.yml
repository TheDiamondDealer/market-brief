name: BR-06 COT contract diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/cot-contract-diagnostic.yml'

permissions:
  contents: read

jobs:
  inspect-official-identities:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Query current CFTC identities
        shell: python
        run: |
          import json
          import urllib.parse
          import urllib.request
          from collections import defaultdict

          datasets = {
              'disaggregated': '72hh-3qpy',
              'tff': 'gpe5-46if',
          }
          queries = [
              ('disaggregated', 'WTI candidates', 'CRUDE OIL'),
              ('disaggregated', 'Natural-gas candidates', 'NATURAL GAS'),
              ('disaggregated', 'Henry-Hub candidates', 'HENRY HUB'),
              ('tff', '10-year Treasury candidates', '10-YEAR'),
              ('tff', '10 year Treasury candidates', '10 YEAR'),
          ]

          for report, label, search in queries:
              where = (
                  "report_date_as_yyyy_mm_dd >= '2026-01-01T00:00:00.000' "
                  f"AND market_and_exchange_names like '%{search.replace("'", "''")}%'"
              )
              params = urllib.parse.urlencode({
                  '$limit': '5000',
                  '$order': 'report_date_as_yyyy_mm_dd DESC',
                  '$where': where,
              })
              url = f"https://publicreporting.cftc.gov/resource/{datasets[report]}.json?{params}"
              request = urllib.request.Request(url, headers={'User-Agent': 'MarketBriefBR06Diagnostic/1.0'})
              with urllib.request.urlopen(request, timeout=90) as response:
                  rows = json.load(response)

              identities = defaultdict(lambda: {'latest': '', 'openInterest': 0, 'rows': 0})
              for row in rows:
                  code = str(row.get('cftc_contract_market_code', '')).strip()
                  name = str(row.get('market_and_exchange_names', '')).strip()
                  date = str(row.get('report_date_as_yyyy_mm_dd', ''))[:10]
                  try:
                      open_interest = float(row.get('open_interest_all') or 0)
                  except (TypeError, ValueError):
                      open_interest = 0
                  item = identities[(code, name)]
                  item['latest'] = max(item['latest'], date)
                  item['openInterest'] = max(item['openInterest'], open_interest)
                  item['rows'] += 1

              print(f"\n=== {label} ({report}) ===")
              for (code, name), meta in sorted(
                  identities.items(),
                  key=lambda item: (item[1]['latest'], item[1]['openInterest'], item[0][0], item[0][1]),
                  reverse=True,
              ):
                  print(json.dumps({
                      'code': code,
                      'name': name,
                      'latest': meta['latest'],
                      'maxOpenInterest': round(meta['openInterest']),
                      'rows': meta['rows'],
                  }, sort_keys=True))
