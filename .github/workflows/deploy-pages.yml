name: Deploy Market Brief Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'scripts/audit_static_site.py'
      - 'scripts/verify_release_routes.py'
      - 'tests/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        default: main
        type: string
  workflow_call:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        default: main
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out requested revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 1
          persist-credentials: false

      - name: Record deployed commit
        id: revision
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Use Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements/ci.txt

      - name: Install offline validation dependencies
        run: |
          python -m pip install --disable-pip-version-check --requirement requirements/ci.txt
          python -m pip check

      - name: Validate deployment revision
        run: |
          python scripts/check_ci_pins.py
          python -m py_compile scripts/*.py tests/*.py
          find site tests/js -type f -name '*.js' -print0 | xargs -0 -n1 node --check
          python scripts/validate_generated_data.py
          python scripts/audit_static_site.py
          python scripts/verify_release_routes.py
          python -m unittest discover -s tests -v

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload static site
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@4c30a030a0001363c3eaa57c4cb20a3f9d0941ed # v4.0.5

      - name: Report deployed revision
        run: echo "Deployed ${{ steps.revision.outputs.sha }} to ${{ steps.deployment.outputs.page_url }}"
