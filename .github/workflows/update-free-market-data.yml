name: Update free market data

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/update_free_data.py'
      - 'scripts/update_free_data_strict.py'
      - 'scripts/update_free_data_api.py'
      - 'scripts/update_free_data_charts.py'
      - 'scripts/validate_generated_data.py'
      - 'scripts/validation_helpers.py'
      - 'scripts/check_ci_pins.py'
      - 'schemas/free-market-data.schema.json'
      - 'requirements/validation.txt'
      - '.github/workflows/update-free-market-data.yml'
      - '.github/workflows/deploy-pages.yml'
  schedule:
    # Weekday morning refresh for Melbourne after the US session.
    - cron: '20 21 * * 1-5'
    # Extra Saturday refresh after the normal Friday COT publication window.
    - cron: '15 2 * * 6'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: generated-data-writer
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out latest main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Use Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements/validation.txt

      - name: Validate immutable dependency pins
        run: python scripts/check_ci_pins.py

      - name: Install validation dependency
        run: |
          python -m pip install --disable-pip-version-check --requirement requirements/validation.txt
          python -m pip check

      - name: Validate collectors
        run: python -m py_compile scripts/update_free_data.py scripts/update_free_data_strict.py scripts/update_free_data_api.py scripts/update_free_data_charts.py scripts/validate_generated_data.py scripts/validation_helpers.py scripts/check_ci_pins.py

      - name: Collect official free data
        run: python scripts/update_free_data_charts.py

      - name: Validate generated output before commit
        run: |
          python scripts/validate_generated_data.py
          node --check site/free-data.js
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('site/data/free-market-data.json').read_text())
          print(f"Generated rates={len(data.get('rates', []))}; COT markets={len(data.get('cot', []))}; generatedAtUtc={data.get('generatedAtUtc')}")
          PY

      - name: Commit validated data
        id: commit
        run: |
          if git diff --quiet -- site/free-data.js site/data/free-market-data.json; then
            echo 'No data changes to commit.'
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add site/free-data.js site/data/free-market-data.json
          git commit -m 'Refresh free official market data'
          git pull --rebase origin main
          python scripts/validate_generated_data.py
          node --check site/free-data.js
          git push origin HEAD:main
          echo 'changed=true' >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  deploy:
    needs: update
    if: ${{ needs.update.result == 'success' }}
    uses: ./.github/workflows/deploy-pages.yml
    with:
      ref: main
