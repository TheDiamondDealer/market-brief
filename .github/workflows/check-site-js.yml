name: Check dashboard JavaScript

on:
  push:
    branches: [main]
    paths:
      - 'site/**/*.js'
      - 'site/index.html'
      - '.github/workflows/check-site-js.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          show-progress: false

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Validate JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          find site -maxdepth 1 -type f -name '*.js' -print0 | sort -z | while IFS= read -r -d '' file; do
            echo "Checking $file"
            node --check "$file"
          done
