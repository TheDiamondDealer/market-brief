name: Check dashboard JavaScript

on:
  push:
    branches: [main]
    paths:
      - 'site/**/*.js'
      - 'site/index.html'
      - '.github/workflows/check-site-js.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          find site -maxdepth 1 -type f -name '*.js' -print0 | sort -z | while IFS= read -r -d '' file; do
            echo "Checking $file"
            node --check "$file"
          done
