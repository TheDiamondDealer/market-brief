name: Check dashboard JavaScript

on:
  push:
    branches: [main]
    paths:
      - 'site/**/*.js'
      - 'site/index.html'
      - '.github/workflows/check-site-js.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          show-progress: false

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Validate JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          find site -maxdepth 1 -type f -name '*.js' -print0 | sort -z | while IFS= read -r -d '' file; do
            echo "Checking $file"
            node --check "$file"
          done
