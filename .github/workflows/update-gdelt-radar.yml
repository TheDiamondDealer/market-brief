name: Update GDELT Discovery Radar

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-gdelt-radar
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true
          show-progress: false

      - name: Use Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Collect public GDELT discovery metadata
        run: python scripts/update_gdelt_radar.py

      - name: Validate discovery payload
        run: python scripts/validate_gdelt_radar.py

      - name: Commit changed snapshot
        run: |
          if git diff --quiet -- site/data/gdelt-radar.json; then
            echo "No GDELT radar changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data/gdelt-radar.json
          git commit -m "Refresh GDELT discovery radar"
          git push
