name: Update GDELT Discovery Radar

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-gdelt-radar
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true
          show-progress: false

      - name: Use Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Collect public GDELT discovery metadata
        run: python scripts/update_gdelt_radar.py

      - name: Validate discovery payload
        run: python scripts/validate_gdelt_radar.py

      - name: Commit changed snapshot
        run: |
          if git diff --quiet -- site/data/gdelt-radar.json; then
            echo "No GDELT radar changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data/gdelt-radar.json
          git commit -m "Refresh GDELT discovery radar"
          git push
