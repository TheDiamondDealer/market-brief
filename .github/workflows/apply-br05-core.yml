name: Apply BR-05 core migration

on:
  push:
    branches: [br-05-core-modules]
    paths:
      - 'scripts/apply_br05_core.py'
      - '.github/workflows/apply-br05-core.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-br05-core
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out remodel branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: br-05-core-modules
          fetch-depth: 0

      - name: Apply core migration
        run: python scripts/apply_br05_core.py

      - name: Correct energy adapter splice
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          path = Path('site/energy-data-ui.js')
          text = path.read_text(encoding='utf-8')
          text, count = re.subn(
              r"; net \$\{signed\(row\.net\)\}; \$\{percentile\(row\)\}; report \$\{row\.reportDate\}`\n    : 'No verified current benchmark contract is mapped\. Older or similarly named contracts are excluded\.';",
              ';',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit(f'energy splice corrections={count}')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate migrated JavaScript
        id: validate
        shell: bash
        run: |
          set +e
          : > br05-migration-errors.log
          while IFS= read -r -d '' file; do
            node --check "$file" >> br05-migration-errors.log 2>&1
            status=$?
            if [ "$status" -ne 0 ]; then
              echo "FAILED: $file" >> br05-migration-errors.log
            fi
          done < <(find site -maxdepth 2 -name '*.js' -print0)
          python -m py_compile scripts/apply_br05_core.py >> br05-migration-errors.log 2>&1
          if grep -q 'FAILED:' br05-migration-errors.log; then
            cat br05-migration-errors.log
            exit 1
          fi

      - name: Upload migration diagnostics on failure
        if: ${{ failure() && steps.validate.outcome == 'failure' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: br05-migration-diagnostics
          path: br05-migration-errors.log
          if-no-files-found: error
          retention-days: 7

      - name: Commit migrated renderers
        run: |
          if git diff --quiet -- site; then
            echo 'Core migration already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add site
          git commit -m 'BR-05: route existing views through core adapters'
          git push origin HEAD:br-05-core-modules
