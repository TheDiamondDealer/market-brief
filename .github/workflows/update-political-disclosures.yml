name: Update political disclosures

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/update_political_disclosures.py'
      - 'scripts/update_political_disclosures_strict.py'
      - 'scripts/update_political_disclosures_ledger.py'
      - 'scripts/political_filing_ledger.py'
      - 'scripts/build_political_data_split.py'
      - 'scripts/validate_generated_data.py'
      - 'scripts/validation_helpers.py'
      - 'scripts/check_ci_pins.py'
      - 'schemas/political-disclosures.schema.json'
      - 'schemas/political-disclosures-summary.schema.json'
      - 'requirements/political.txt'
      - 'requirements/validation.txt'
      - '.github/workflows/update-political-disclosures.yml'
      - '.github/workflows/deploy-pages.yml'
  schedule:
    # Weekday morning refresh in Melbourne. Runs at 08:15 AEST / 09:15 AEDT.
    - cron: '15 22 * * 0-4'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: generated-data-writer
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      POLITICAL_DISCLOSURE_START_YEAR: '2012'
      POLITICAL_DISCLOSURE_TIMEOUT: '60'
      POLITICAL_REQUIRE_TRADES: '1'
    steps:
      - name: Check out latest main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Use Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements/political.txt
            requirements/validation.txt

      - name: Validate immutable dependency pins
        run: python scripts/check_ci_pins.py

      - name: Install parser and validation dependencies
        run: |
          python -m pip install --disable-pip-version-check --requirement requirements/political.txt
          python -m pip check

      - name: Validate collectors
        run: python -m py_compile scripts/update_political_disclosures.py scripts/update_political_disclosures_strict.py scripts/update_political_disclosures_ledger.py scripts/political_filing_ledger.py scripts/build_political_data_split.py scripts/validate_generated_data.py scripts/validation_helpers.py scripts/check_ci_pins.py

      - name: Collect official disclosures
        run: python scripts/update_political_disclosures_ledger.py

      - name: Validate generated output before commit
        run: |
          python scripts/validate_generated_data.py
          node --check site/political-data.js
          python - <<'PY'
          import json
          from pathlib import Path
          summary = json.loads(Path('site/data/political-disclosures-summary.json').read_text())
          ledger = json.loads(Path('site/data/political/filing-ledger.json').read_text())
          manifest = json.loads(Path('site/data/political/manifest.json').read_text())
          lazy_summary = json.loads(Path('site/data/political/summary.json').read_text())
          pelosi = summary.get('trackers', {}).get('pelosi', {}).get('trades', 0)
          assert manifest.get('totalTrades') == summary.get('totalTrades') == lazy_summary.get('totalTrades')
          assert manifest.get('trackerCount') == len(manifest.get('trackers', {}))
          for tracker_id, item in manifest.get('trackers', {}).items():
              annual_total = sum(json.loads(Path(url.replace('data/', 'site/data/')).read_text()).get('tradeCount', 0) for url in item.get('annualUrls', {}).values())
              assert annual_total == item.get('tradeCount'), (tracker_id, annual_total, item.get('tradeCount'))
          print(f"Generated political trades={summary.get('totalTrades')}; Pelosi={pelosi}; generatedAt={summary.get('generatedAt')}")
          print(f"Filing ledger={ledger.get('summary', {}).get('filings', 0)}; retryable={ledger.get('summary', {}).get('retryable', 0)}; parser={ledger.get('parserVersion')}")
          print(f"Lazy files trackers={manifest.get('trackerCount')}; recent={len(lazy_summary.get('recentFilings', []))}")
          PY

      - name: Commit validated data
        id: commit
        run: |
          CHANGES="$(git status --porcelain -- site/political-data.js site/data/political-disclosures.json site/data/political-disclosures-summary.json site/data/political)"
          if [ -z "$CHANGES" ]; then
            echo 'No disclosure changes to commit.'
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$CHANGES"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add site/political-data.js site/data/political-disclosures.json site/data/political-disclosures-summary.json site/data/political
          git commit -m 'Refresh official political disclosures'
          git pull --rebase origin main
          python scripts/validate_generated_data.py
          node --check site/political-data.js
          git push origin HEAD:main
          echo 'changed=true' >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  deploy:
    needs: update
    if: ${{ needs.update.result == 'success' }}
    uses: ./.github/workflows/deploy-pages.yml
    with:
      ref: main
