name: Update political disclosures

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/update_political_disclosures.py'
      - 'scripts/update_political_disclosures_strict.py'
      - '.github/workflows/update-political-disclosures.yml'
  schedule:
    # Weekday morning refresh in Melbourne. Runs at 08:15 AEST / 09:15 AEDT.
    - cron: '15 22 * * 0-4'

permissions:
  contents: write

concurrency:
  group: update-political-disclosures
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      POLITICAL_DISCLOSURE_START_YEAR: '2012'
      POLITICAL_DISCLOSURE_TIMEOUT: '60'
      POLITICAL_REQUIRE_TRADES: '1'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install parser dependencies
        run: python -m pip install --disable-pip-version-check requests beautifulsoup4 pdfplumber

      - name: Validate collector
        run: python -m py_compile scripts/update_political_disclosures.py scripts/update_political_disclosures_strict.py

      - name: Collect official disclosures
        run: python scripts/update_political_disclosures_strict.py

      - name: Validate generated data
        run: |
          python -m json.tool site/data/political-disclosures.json >/dev/null
          node --check site/political-data.js
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('site/data/political-disclosures.json').read_text())
          pelosi = data.get('trackers', {}).get('pelosi', {}).get('trades', [])
          total = sum(len(item.get('trades', [])) for item in data.get('trackers', {}).values())
          if not pelosi:
              raise SystemExit('Validation failed: Pelosi should have historical PTR records, but none were parsed.')
          print(f'Validated {total} retained political transactions; Pelosi={len(pelosi)}')
          PY

      - name: Commit changed disclosure data
        run: |
          if git diff --quiet -- site/political-data.js site/data/political-disclosures.json; then
            echo 'No disclosure changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '4180957+github-actions[bot]@users.noreply.github.com'
          git add site/political-data.js site/data/political-disclosures.json
          git commit -m 'Refresh official political disclosures'
          git pull --rebase origin main
          git push
