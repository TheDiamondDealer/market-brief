name: Update crowd expectations

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/update_crowd_expectations.py'
      - 'scripts/update_crowd_expectations_hardened.py'
      - 'scripts/validate_crowd_expectations.py'
      - 'scripts/crowd_expectations_registry.json'
      - 'schemas/crowd-expectations.schema.json'
      - 'tests/test_crowd_expectations.py'
      - 'tests/test_crowd_selection_balance.py'
      - '.github/workflows/update-crowd-expectations.yml'
      - '.github/workflows/deploy-pages.yml'
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: generated-data-writer
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out latest main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Use Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements/validation.txt

      - name: Validate immutable dependency pins
        run: python scripts/check_ci_pins.py

      - name: Install validation dependency
        run: |
          python -m pip install --disable-pip-version-check --requirement requirements/validation.txt
          python -m pip check

      - name: Validate collector and fixtures
        run: |
          python -m py_compile scripts/update_crowd_expectations.py scripts/update_crowd_expectations_hardened.py scripts/validate_crowd_expectations.py tests/test_crowd_expectations.py tests/test_crowd_selection_balance.py
          python -m unittest tests/test_crowd_expectations.py tests/test_crowd_selection_balance.py -v

      - name: Collect public crowd market data
        env:
          CROWD_EXPECTATIONS_USER_AGENT: MarketBriefResearch/1.2 (+https://github.com/TheDiamondDealer/market-brief)
        run: python scripts/update_crowd_expectations_hardened.py

      - name: Validate generated output and frontend
        run: |
          python scripts/validate_crowd_expectations.py
          node --check site/features/crowd-expectations/crowd-data.js
          node --check site/features/crowd-expectations/crowd-health.js
          node --check site/features/crowd-expectations/crowd-page.js
          node --check site/features/crowd-expectations/crowd-command.js
          node --check site/features/crowd-expectations/crowd-asset.js
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('site/data/crowd-expectations.json').read_text())
          print(
              f"status={data['collection']['status']}; "
              f"scanned={data['collection']['rawMarketCount']}; "
              f"selected={data['collection']['selectedMarketCount']}; "
              f"shocks={len(data['shocks'])}"
          )
          for category in data['categories']:
              print(f"- {category['id']}: {category['count']}")
          PY

      - name: Commit validated crowd data
        run: |
          if git diff --quiet -- site/data/crowd-expectations.json; then
            echo 'No crowd-expectation changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add site/data/crowd-expectations.json
          git commit -m 'Refresh crowd expectations'
          git pull --rebase origin main
          python scripts/validate_crowd_expectations.py
          git push origin HEAD:main

  deploy:
    needs: update
    if: ${{ needs.update.result == 'success' }}
    uses: ./.github/workflows/deploy-pages.yml
    with:
      ref: main
