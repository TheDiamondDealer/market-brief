name: Apply BR-04 shell migration

on:
  pull_request:
    branches: [main]
  push:
    branches: [br-04-shared-shell]
    paths:
      - 'scripts/apply_br04_shell.py'
      - '.github/workflows/apply-br04-shell.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-br04-shell
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out remodel branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: br-04-shared-shell
          fetch-depth: 0

      - name: Apply shell markup
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply_br04_shell.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace("'  <script src=\"command-centre.js\"></script>\\n'", "'<script src=\"command-centre.js\"></script>\\n'")
          text = text.replace("'  <script src=\"command-centre.js\"></script>\\n  <script src=\"shell.js\"></script>\\n'", "'<script src=\"command-centre.js\"></script>\\n<script src=\"shell.js\"></script>\\n'")
          path.write_text(text, encoding='utf-8')
          PY
          python scripts/apply_br04_shell.py

      - name: Validate migrated document and shell script
        run: |
          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          HTMLParser().feed(Path('site/index.html').read_text(encoding='utf-8'))
          PY
          node --check site/shell.js

      - name: Commit migrated markup
        run: |
          if git diff --quiet -- site/index.html; then
            echo 'Shell markup already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add site/index.html
          git commit -m 'BR-04: apply shared shell markup'
          git push origin HEAD:br-04-shared-shell

# One-time migration workflow; removed before merge.
