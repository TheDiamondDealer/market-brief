version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "20:00"
      timezone: Australia/Melbourne
    open-pull-requests-limit: 5
    groups:
      python-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "20:15"
      timezone: Australia/Melbourne
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
